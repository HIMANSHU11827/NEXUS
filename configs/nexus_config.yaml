disabled_skills: []
disabled_tools: []
mcp_servers:
  nexus-browser:
    active: false
    args:
    - integrations/nexus-browser-bridge/build/src/bin/nexus-omni.js
    - --no-usage-statistics
    command: node
    description: NEXUS high-fidelity browser automation node. Provides Playwright-backed headless scraping,
      UI interaction, and web action execution.
memory:
  persistence: atomic_checkpoints
  vault_mode: gravity_rag
providers:
  cloud:
    azure_openai:
      active: false
      api_key: YOUR_AZURE_KEY_HERE
      deployment: gpt-4o
      endpoint: YOUR_AZURE_ENDPOINT_HERE
    cohere:
      active: false
      api_key: YOUR_COHERE_KEY_HERE
      model: command-r-plus
    commandcode:
      active: false
      api_key: ${COMMANDCODE_API_KEY}
      endpoint: https://api.commandcode.ai/provider/v1/chat/completions
      model: deepseek/deepseek-v4-flash
      parent_provider: commandcode
    deepseek:
      active: true
      api_key: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
    fireworks:
      active: false
      api_key: YOUR_FIREWORKS_KEY_HERE
      model: accounts/fireworks/models/llama-v3p1-70b-instruct
    gemini:
      active: false
      api_key: YOUR_GOOGLE_KEY_HERE
      model: gemini-1.5-pro
    groq:
      active: false
      api_key: YOUR_GROQ_KEY_HERE
      model: llama-3.1-70b-versatile
    mistral:
      active: false
      api_key: YOUR_MISTRAL_KEY_HERE
      model: mistral-large-latest
    openai:
      active: false
      api_key: YOUR_OPENAI_KEY_HERE
      model: gpt-4o
    openrouter:
      active: true
      api_key: ${OPENROUTER_API_KEY}
      model: openrouter/free
    nvidia:
      active: false
      api_key: ${NVIDIA_API_KEY}
      model: z-ai/glm-5.1
    perplexity:
      active: false
      api_key: YOUR_PERPLEXITY_KEY_HERE
      model: llama-3.1-sonar-large-128k-online
    qwen:
      active: false
      api_key: ''
      model: qwen-turbo
    replicate:
      active: false
      api_key: YOUR_REPLICATE_KEY_HERE
      model: meta/meta-llama-3.1-405b-instruct
    sambanova:
      active: false
      api_key: YOUR_SAMBANOVA_KEY_HERE
      model: Meta-Llama-3.1-70B-Instruct
    together:
      active: false
      api_key: YOUR_TOGETHER_KEY_HERE
      model: meta-llama/Llama-3-70b-chat-hf
    universal:
      active: false
      api_key: YOUR_KEY_HERE
      endpoint: http://localhost:8000/v1/chat/completions
      model: your-model-name
    vlm:
      active: false
      api_key: YOUR_VLM_KEY_HERE
      model: gpt-4o
    xai:
      active: false
      api_key: YOUR_XAI_KEY_HERE
      model: grok-beta
  local:
    SOVEREIGN_BRAIN:
      active: true
      endpoint: https://openrouter.ai/api/v1/chat/completions
      model: openrouter/free
      parent_provider: openrouter
    llama_cpp:
      active: false
      ctx_size: 4096
      gpu_layers: -1
      main_gpu: 0
      model_path: models/local/your-model.gguf
    lm_studio:
      active: true
      endpoint: http://127.0.0.1:1234/v1/chat/completions
      model: lmstudio-community/gemma-3-270m-it-qat
    ollama:
      active: false
      default_model: llama3
      endpoint: http://localhost:11434
security:
  prover_gate_active: false
  safety_strictness: 0.8
  sandbox_mode: firecracker_ev
system:
  brain_mode: AUTO
  branding: 🧬
  default_provider: deepseek
  kernel_mode: recursive_frontier
  log_level: INFO
  provider_name: deepseek
  shell: ghost_v1
  workspace_root: ./workspace
vision:
  auto_release_camera: true
  backend_detection: true
  browser_holistic: true
  camera_enabled: true
  camera_index: 0
  capture_height: 720
  capture_width: 1280
  default_modes:
  - objects
  enabled: true
  model_dir: models/local/vision
  native_acceleration: auto
  status_endpoint: /api/vision/status
  stream_endpoint: /api/vision/stream
  stream_fps_limit: 24
  webgl_acceleration: true
  yolo_detect_model: models/local/vision/yolo11n.pt
  yolo_openvino_dir: models/local/vision/yolo11n_openvino_model
voice:
  allow_text_fallback: true
  assistant_timeout_seconds: 45.0
  auto_speak: true
  enabled: true
  keep_models_loaded: true
  kitten_model: KittenML/kitten-tts-micro-0.8
  microphone_device: 1
  min_speech_seconds: 0.25
  push_to_talk_key: none
  record_seconds: 60.0
  require_wake_word: false
  sample_rate: 16000
  silence_threshold: 0.008
  silence_timeout_seconds: 2.0
  speaker_device: null
  speech_speed: 1.2
  voice_name: Jasper
  volume: 1.0
  wake_word: nexus
  wake_word_enabled: false
  whisper_batch_size: 1
  whisper_chunk_length_s: 15
  whisper_device: auto
  whisper_language: auto
  whisper_model: openai/whisper-tiny
runtime_features:
  hive: true
  evolution: true
  scheduler: true
  reminders: true
  health: true
