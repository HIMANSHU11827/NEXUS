  proactive_debugger:
    active: true
    description: '--- name: proactive_debugger description: Autonomous neural debugger for high-fidelity
      system repair. version: 1.0.0 metadata:'
  test_guardian:
    active: true
    description: '--- name: test_guardian description: Autonomous verification engine for NEXUS modifications.
      version: 1.0.0 metadata:'
  test_mission_nexus_analysis:
    active: true
    description: '--- name: test_mission_nexus_analysis description: "Execute the TEST_MISSION workflow:
      locate nexus.py, preview its header, enumerate available skills'
custom_skill_descriptions:
  proactive_debugger: '--- name: proactive_debugger description: Autonomous neural debugger for high-fidelity
    system repair. version: 1.0.0 metadata:'
  test_guardian: '--- name: test_guardian description: Autonomous verification engine for NEXUS modifications.
    version: 1.0.0 metadata:'
  test_mission_nexus_analysis: '--- name: test_mission_nexus_analysis description: "Execute the TEST_MISSION
    workflow: locate nexus.py, preview its header, enumerate available skills'
custom_tool_configs:
  agent_context:
    active: true
    description: Generate NEXUS.md from the live code graph for coding-agent structural awareness.
  atlas_map:
    active: true
    description: 'Generates a logic map of a directory. Input: ''dir''. Use this to understand codebase
      architecture.'
  bash:
    active: true
    description: Execute shell commands. Supports persistent sessions, timeouts, and streaming.
  benchmark:
    active: true
    description: Run and inspect local NEXUS regression benchmarks.
  brain_trainer:
    active: true
    description: 'Handles the NEXUS model lifecycle. Modes: ''train'' (Fine-tune SafeTensors), ''export''
      (Convert to GGUF), ''cycle'' (Train + Export).'
  code_graph:
    active: true
    description: Build and query a persistent codebase knowledge graph of files, symbols, imports, and
      calls.
  cognition:
    active: true
    description: Read/write adaptive memory graph and zero-token context packets.
  competitive_moat:
    active: true
    description: Audit NEXUS against competitor-style agent capability categories and produce an attack
      plan.
  diagnostics:
    active: true
    description: Run compile/parse diagnostics for Python, JSON, YAML, and optional gui build.
  edit_plan:
    active: true
    description: Build a symbol-aware pre-edit plan with blast radius and recommended checks.
  evidence_ledger:
    active: true
    description: Record and audit claims with supporting evidence, status, and confidence.
  failure_vaccine:
    active: true
    description: Convert concrete failures into memory rules, fix strategies, and regression plans.
  file_edit:
    active: true
    description: View, create, edit files with str_replace, insert, and undo support.
  glob:
    active: true
    description: Find files matching glob patterns (e.g., '**/*.py', 'src/**/*.ts')
  grep:
    active: true
    description: Search file contents using regex patterns.
  hive_broadcast:
    active: true
    description: 'Broadcast a discovery or result to the collective Hive Mind. Params: ''message'' (str),
      ''hive_id'' (opt).'
  hive_intent:
    active: true
    description: 'Declare a collaborative intent (e.g., ''REFACTORING_AUTH'', ''DEBUGGING_OOM''). Other
      agents will see this intent in their context. Params: ''intent'' (str), ''hive_id'' (opt).'
  hive_merge_plan:
    active: true
    description: 'Inspect Hive artifacts for claimed changed files and report overlapping edits. Params:
      ''hive_id'' (str).'
  hive_pulse:
    active: true
    description: 'Retrieves recent signals from the hive. Params: ''hive_id'' (opt).'
  hive_resume:
    active: true
    description: 'Resume pending tasks for a Hive mission. Params: ''hive_id'' (str), ''workers'' (int,
      optional).'
  hive_spawn:
    active: true
    description: 'Delegate a task to a specialized Hive worker. Params: ''objective'' (str), ''persona''
      (str - e.g. ENGINEER, AUDITOR, or a custom specialist), ''persona_description'' (opt), ''hive_id''
      (opt).'
  hive_team:
    active: true
    description: 'Manage the shared Team Mission Board. Params: ''action'' (write/read), ''content'' (str),
      ''hive_id'' (opt).'
  holistic:
    active: true
    description: Detects face, pose, and hand landmarks from an image using MediaPipe Holistic.
  hyper_plan:
    active: true
    description: Create an explicit planner/critic/verifier plan with uncertainty scoring.
  librarian_harvest:
    active: true
    description: 'Harvests documentation from a URL and stores it locally for RAG. Params: ''url'' (str),
      ''category'' (str - e.g. ''react'', ''python'').'
  mediapipe_suite:
    active: true
    description: Connects MediaPipe vision, text, audio, Holistic, and edge GenAI task capabilities to
      NEXUS.
  memory_ops:
    active: true
    description: Manage working memory (Mental Notes) and episodic recall (Mental Time Travel).
  mission_replay:
    active: true
    description: Inspect the append-only mission replay event log.
  nexus_comms:
    active: true
    description: 'Sends messages to external platforms (discord, whatsapp, telegram). Params: platform,
      message, recipient.'
  nexus_evolve:
    active: true
    description: 'Analyzes telemetry and applies self-improvements. Params: ''mode'' (analyze|apply),
      ''patch'' (if apply). Use this to solve recurring tool failures by editing task logic.'
  nexus_omni:
    active: true
    description: NEXUS Omni-UI Control - Unified Browser automation and OS-level GUI control (mouse/keyboard).
  nexus_switch_brain:
    active: true
    description: Switches the primary cognition engine. Use 'nexus' for local brain or 'big' for cloud/teacher
      brain.
  patch_ledger:
    active: true
    description: Create baselines and record inspectable patch diffs independent of Git.
  process:
    active: true
    description: 'Manage background processes: start, poll, and kill.'
  rag:
    active: true
    description: 'Performs next-gen RAG. Input: ''query''. Finds definitive code symbols and high-precision
      snippets.'
  roadmap:
    active: true
    description: Audit roadmap completion from real project files and write docs/ROADMAP_STATUS.md.
  rollback:
    active: true
    description: Create and restore project-local rollback snapshots for files.
  side_effects:
    active: true
    description: Predict cross-file blast radius before editing a source file.
  skill_forge:
    active: true
    description: Create and search reusable workflow/macro definitions.
  skill_synthesizer:
    active: true
    description: Synthesizes a new tool/skill for NEXUS. Provide name, description, and Python code (BaseTool
      subclass).
  system_audit:
    active: true
    description: Scans the workspace for security flaws, credentials, and poor patterns.
  system_monitor:
    active: true
    description: Provides real-time hardware telemetry (CPU, RAM, Disk, OS) and system health metrics.
  system_snapshot:
    active: true
    description: 'Creates a full system backup for emergency recovery. Params: ''label'' (str).'
  test_select:
    active: true
    description: Select targeted tests and diagnostics for changed files.
  todo:
    active: true
    description: Create and manage task lists for complex workflows.
  tool_economy:
    active: true
    description: Inspect persistent tool success, latency, and reputation metrics.
  unified_graph:
    active: true
    description: Build and query one NEXUS graph over code, memory, evidence, sessions, tools, and benchmarks.
  vision_accelerator:
    active: true
    description: Reports native iGPU/GPU acceleration readiness for NEXUS vision runners.
  web_fetch:
    active: true
    description: Fetch a URL and return readable text content.
  web_search:
    active: true
    description: Search the web using DuckDuckGo (no API key needed).
