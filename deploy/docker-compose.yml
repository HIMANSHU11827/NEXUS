version: "3.9"

services:
  nexus:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: nexus-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - nexus_data:/home/nexus/.nexus
      - ../workspace:/app/workspace
      - ../logs:/app/logs
    env_file:
      - ../config/.env
    environment:
      - NEXUS_HOME=/home/nexus/.nexus
      - NEXUS_ROOT=/app
    command: python -m nexus

  nexus-gui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-gui
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - nexus
    environment:
      - VITE_API_URL=http://nexus:8000
    working_dir: /app/gui
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  nexus_data:
