# Planner profile — reasoning-heavy, plan-scoped write access
system:
  default_provider: local
  provider_name: PLANNER_BRAIN
  brain_mode: AUTO
  branding: "🗂️"
  log_level: INFO

security:
  safety_strictness: 0.85
  prover_gate_active: true

providers:
  cloud:
    openrouter:
      active: true
      model: deepseek/deepseek-v4-flash
    deepseek:
      active: false
      model: deepseek-coder
  local:
    PLANNER_BRAIN:
      active: true
      parent_provider: openrouter
      model: deepseek/deepseek-v4-flash
    lm_studio:
      active: true
      endpoint: http://127.0.0.1:1234/v1/chat/completions
      model: lmstudio-community/gemma-3-270m-it-qat
