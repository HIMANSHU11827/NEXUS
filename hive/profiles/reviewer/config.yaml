# Reviewer profile — best available model, read-only, maximum safety
system:
  default_provider: cloud
  provider_name: REVIEWER_BRAIN
  brain_mode: AUTO
  branding: "✅"
  log_level: INFO

security:
  safety_strictness: 0.95
  prover_gate_active: true

providers:
  cloud:
    openrouter:
      active: true
      model: openai/gpt-4o
    anthropic:
      active: false
      model: claude-sonnet-4-20250514
    deepseek:
      active: false
      model: deepseek-coder
  local:
    REVIEWER_BRAIN:
      active: true
      parent_provider: openrouter
      model: openai/gpt-4o
    lm_studio:
      active: true
      endpoint: http://127.0.0.1:1234/v1/chat/completions
      model: lmstudio-community/gemma-3-270m-it-qat
