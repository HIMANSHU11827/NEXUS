memory:
  persistence: atomic_checkpoints
  vault_mode: gravity_rag
offline:
  mode: 'true'
provider:
  timeout: '25'
providers:
  cloud:
    anthropic:
      active: false
      model: claude-sonnet-4-20250514
    azure_openai:
      active: false
      deployment: gpt-4o
    cohere:
      active: false
      model: command-r-plus
    commandcode:
      active: false
      api_key: ''
      endpoint: https://api.commandcode.ai/provider/v1/chat/completions
      model: deepseek/deepseek-v4-flash
    deepseek:
      active: false
      model: deepseek-coder
    fireworks:
      active: false
      model: accounts/fireworks/models/llama-v3p1-70b-instruct
    gemini:
      active: false
      model: gemini-1.5-pro
    groq:
      active: false
      model: llama-3.1-70b-versatile
    mistral:
      active: false
      model: mistral-large-latest
    nvidia:
      active: false
      api_key: ''
      model: ''
    openai:
      active: false
      model: gpt-4o
    openrouter:
      active: true
      api_key: ''
      endpoint: ''
      model: openrouter/free
    perplexity:
      active: false
      model: llama-3.1-sonar-large-128k-online
    qwen:
      active: false
      model: qwen-turbo
    replicate:
      active: false
      model: meta/meta-llama-3.1-405b-instruct
    sambanova:
      active: false
      model: Meta-Llama-3.1-70B-Instruct
    together:
      active: false
      model: meta-llama/Llama-3-70b-chat-hf
    universal:
      active: false
      endpoint: http://localhost:8000/v1/chat/completions
      model: your-model-name
    vlm:
      active: false
      model: gpt-4o
    xai:
      active: false
      model: grok-beta
  local:
    SOVEREIGN_BRAIN:
      active: false
      model: ''
      parent_provider: ''
    llama_cpp:
      active: false
      ctx_size: 4096
      gpu_layers: -1
      main_gpu: 0
      model_path: models/local/your-model.gguf
    lm_studio:
      active: false
      endpoint: http://127.0.0.1:1234/v1/chat/completions
      model: ''
    ollama:
      active: false
      default_model: llama3
      endpoint: http://localhost:11434
security:
  prover_gate_active: false
  safety_strictness: 0.8
  sandbox_mode: firecracker_ev
stream:
  deadline: '120'
system:
  brain_mode: AUTO
  branding: "\U0001F980"
  default_provider: cloud
  kernel_mode: recursive_frontier
  log_level: INFO
  provider_name: openrouter
  shell: ghost_v1
  workspace_root: ./workspace
vision:
  auto_release_camera: true
  backend_detection: true
  browser_holistic: true
  camera_enabled: true
  camera_index: 0
  capture_height: 720
  capture_width: 1280
  default_modes:
  - objects
  enabled: true
  model_dir: models/local/vision
  native_acceleration: auto
  status_endpoint: /api/vision/status
  stream_endpoint: /api/vision/stream
  stream_fps_limit: 24
  webgl_acceleration: true
  yolo_detect_model: models/local/vision/yolo11n.pt
  yolo_openvino_dir: models/local/vision/yolo11n_openvino_model
voice:
  allow_text_fallback: true
  assistant_timeout_seconds: 45.0
  auto_speak: true
  enabled: false
  keep_models_loaded: true
  kitten_model: KittenML/kitten-tts-micro-0.8
  microphone_device: null
  min_speech_seconds: 0.25
  push_to_talk_key: none
  record_seconds: 60.0
  require_wake_word: false
  sample_rate: 16000
  silence_threshold: 0.008
  silence_timeout_seconds: 2.0
  speaker_device: null
  speech_speed: 1.2
  voice_name: Jasper
  volume: 1.0
  wake_word: nexus
  wake_word_enabled: false
  whisper_batch_size: 1
  whisper_chunk_length_s: 15
  whisper_device: auto
  whisper_language: auto
  whisper_model: models/local/voice/distil-whisper-large-v3
