# Researcher profile — web-capable, read-only focus, low safety friction for exploration
system:
  default_provider: cloud
  provider_name: RESEARCHER_BRAIN
  brain_mode: AUTO
  branding: "🔍"
  log_level: INFO

security:
  safety_strictness: 0.7
  prover_gate_active: false

providers:
  cloud:
    openrouter:
      active: true
      model: openai/gpt-4o
    perplexity:
      active: true
      model: llama-3.1-sonar-large-128k-online
    gemini:
      active: false
      model: gemini-1.5-pro
  local:
    RESEARCHER_BRAIN:
      active: true
      parent_provider: openrouter
      model: openai/gpt-4o
