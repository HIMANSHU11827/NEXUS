# Coder profile — coding-optimized, full write access, sandboxed
system:
  default_provider: local
  provider_name: CODER_BRAIN
  brain_mode: AUTO
  branding: "💻"
  log_level: INFO

security:
  safety_strictness: 0.9
  prover_gate_active: true
  sandbox_mode: firecracker_ev

providers:
  cloud:
    openrouter:
      active: true
      model: deepseek/deepseek-v4-flash
    deepseek:
      active: true
      model: deepseek-coder
    openai:
      active: false
      model: gpt-4o
  local:
    CODER_BRAIN:
      active: true
      parent_provider: openrouter
      model: deepseek/deepseek-v4-flash
    lm_studio:
      active: true
      endpoint: http://127.0.0.1:1234/v1/chat/completions
      model: lmstudio-community/gemma-3-270m-it-qat
